            - generic [ref=e74]:
              - heading "Introducing Genie One, Genie Agents, and Genie Ontology" [level=1] [ref=e75]
              - paragraph [ref=e76]: The data-smart AI coworker, grounded in your enterprise context.
            - paragraph [ref=e77]:
              - text: by
              - link "Sydney Sundell" [ref=e78] [cursor=pointer]:
                - /url: /blog/author/sydney-sundell
              - text: ","
              - link "Ken Wong" [ref=e79] [cursor=pointer]:
                - /url: /blog/author/ken-wong
              - text: and
              - link "Elise Georis" [ref=e80] [cursor=pointer]:
                - /url: /blog/author/elise-georis
          - generic [ref=e84]:
            - button "Summary" [ref=e86] [cursor=pointer]:
              - generic [ref=e88]: Summary
              - img [ref=e90]
            - list [ref=e94]:
              - listitem [ref=e95]: Genie One is the data-smart AI coworker for business users, expanding Genie beyond conversational analytics, with agentic actions, skills, integrations across Slack, Microsoft Teams, mobile apps, and MCP-based assistant experiences.
              - listitem [ref=e96]: Genie Agents let teams turn prompts into shareable, autonomous agents that can reason over structured and unstructured data, and take action across business tools.
              - listitem [ref=e97]: Genie Ontology is a unified context layer that extracts and reasons over knowledge from data and connected tools, so Genie can identify trustworthy sources and answer with full business context.
          - generic [ref=e98]:
            - paragraph [ref=e99]: Despite the progress in LLMs and consumer chat agents, most enterprise teams still struggle to put AI to work on real business questions. The reason is that getting insights out of data - the ground truth of the business - is hard even with the latest generations of models and agents.
            - paragraph [ref=e100]:
              - text: The reason for this is that the business context required to use data is scattered across dashboards, queries, pipelines, wikis, tickets, documents, and chat threads. When AI doesn’t easily find the information it needs, it fills in the gaps with inference, producing answers that are generic at best and wrong at worst. The current generation of agents often go through a process of iterative probing that is extremely slow and costly, and forcing a compromise in quality. This has resulted in
              - link "unacceptably poor performance" [ref=e101] [cursor=pointer]:
                - /url: https://www.databricks.com/blog/pushing-frontier-data-agents-genie
              - text: for truly data-driven decision making and actions.
            - paragraph [ref=e102]: "Today, we are announcing our solution to this problem:"
            - list [ref=e103]:
              - listitem [ref=e104]: "Genie One: a data-smart AI coworker that works across all of your data,"
              - listitem [ref=e105]: "Genie Agents: a way for everyone to create dedicated agents to automate work, and"
              - listitem [ref=e106]: "Genie Ontology: an automatic and secure context store that enables agents to achieve superior accuracy and performance."
            - 'heading "Genie One: The data-smart AI coworker for every team" [level=2] [ref=e107]'
            - paragraph [ref=e108]:
              - figure [ref=e109]:
                - 'button "Expand: image1.png" [ref=e110]':
                  - img "image1.png" [ref=e112]
                  - generic:
                    - img
                    - generic: Expand
            - paragraph [ref=e113]:
              - text: Genie began as a conversational analytics assistant in Databricks AI/BI.
              - link "Genie One" [ref=e114] [cursor=pointer]:
                - /url: https://www.databricks.com/product/genie/one
              - text: "is the next step: a data-smart AI coworker designed to help users move from insight to action."
            - list [ref=e115]:
              - listitem [ref=e116]:
                - strong [ref=e117]: For all of your apps and data.
                - text: Genie One connects insights from across your entire data estate through a rich ecosystem of native connectors. Through
                - link "Lakehouse federation" [ref=e118] [cursor=pointer]:
                  - /url: https://docs.databricks.com/aws/en/query-federation/
                - text: ","
                - link "Lakeflow Connect" [ref=e119] [cursor=pointer]:
                  - /url: https://docs.databricks.com/aws/en/ingestion/lakeflow-connect/
                - text: ", and new two-way integrations to everyday business tools (e.g., Gmail, Slack, Teams), Genie One can extract insights and orchestrate actions with any system you may have."
              - listitem [ref=e120]:
                - strong [ref=e121]: Full co-work capabilities.
                - text: Genie One provides a full suite of agentic-cowork capabilities, including schedules and alerts, monitoring, document creation, custom skills, and custom MCP support. Sales leaders can ask Genie to prepare a daily brief for all their customer meetings, combining the context from their calendar, email, and hard data from their Lakehouse and other connected systems. General managers can simply paste in last month’s business review document, and ask Genie to update it with the latest information from their inventory systems, along with the transcripts from their team discussions. The possibilities are endless.
            - paragraph:
              - figure:
                - 'button "Expand: image7.gif"':
                  - generic:
                    - img "image7.gif"
                  - generic: Expand
            - paragraph [ref=e122]:
              - text: Because enterprise work happens across a full stack of tools and surfaces, we’re bringing Genie to everywhere work happens—starting by embedding it natively into
              - link "Slack" [ref=e123] [cursor=pointer]:
                - /url: https://docs.databricks.com/aws/en/genie-ui/genie-slack
              - text: and
              - link "Microsoft Teams" [ref=e124] [cursor=pointer]:
                - /url: https://learn.microsoft.com/en-us/azure/databricks/integrations/msft-teams
              - text: . Users can simply @mention Genie in any conversation to ask questions in natural language and get accurate answers in seconds. Genie can also be used in public channels and threads, helping teams collaborate without switching context. Every response is governed, secure, and tailored to what each user is authorized to access.
            - paragraph:
              - figure:
                - 'button "Expand: image5.gif"':
                  - generic:
                    - img "image5.gif"
                  - generic: Expand
            - paragraph [ref=e125]:
              - text: For users on the go, we’re launching new
              - link "databricks genie iOS" [ref=e126] [cursor=pointer]:
                - /url: https://apps.apple.com/lk/app/databricks-genie/id6758961415
                - text: iOS
              - text: and
              - link "Android" [ref=e127] [cursor=pointer]:
                - /url: https://play.google.com/store/apps/details?id=com.databricks.one.mobile&hl=en_US
              - text: apps that put Genie in your pocket. Users can ask questions, get alerts, and take action on insights grounded in your company data, from anywhere.
            - paragraph [ref=e128]: And for organizations who have adopted an existing AI agent or developed their own, we’re also announcing the Genie MCP App, which allows those users to benefit from Genie without having to change their workflows.
            - paragraph:
              - figure:
                - 'button "Expand: image4.gif"':
                  - generic:
                    - img "image4.gif"
                  - generic: Expand
            - blockquote [ref=e129]:
              - img [ref=e130]
              - generic [ref=e135]: Our investment in building the Uplight Data Platform on top of Databricks is paying off in powerful new ways. By bringing Genie One capabilities to our data, we’re enabling teams across Uplight to explore, discover, and innovate with more speed, confidence, and creativity than ever before. This is the promise of data democratization - enabling a culture where curiosity, data-informed decision-making, and innovation can happen at every level of the company.
              - generic [ref=e136]: — Micaela Christopher, Director of Data Science and Engineering, Uplight
            - 'heading "Genie Agents: from a single prompt to an autonomous agent" [level=2] [ref=e137]'
            - paragraph [ref=e138]:
              - text: Databricks customers have created more than a million Genie Spaces—curated, governed chat experiences scoped to specific topics, with verified logic and benchmarks. Now,
              - strong [ref=e139]: Genie Spaces is evolving into Genie Agents
              - text: ": curated, domain-specific AI agents that:"
            - list [ref=e140]:
              - listitem [ref=e141]:
                - strong [ref=e142]: Take autonomous action.
                - text: Genie Agents use the same tools Genie One does—MCP connections, scheduled tasks, document and artifact generation, and writes to external systems—to complete multi-step workflows without need for oversight or intervention.
              - listitem [ref=e143]:
                - strong [ref=e144]: Reason over unstructured data, not just tables and views.
                - text: Agents can be grounded in documents, files, and knowledge sources alongside structured data, covering the full context of a real business problem.
            - paragraph [ref=e145]:
              - text: "Best of all, creating an agent is as simple as describing what you want:"
              - strong [ref=e146]: spin up a Genie Agent from a single prompt
              - text: in Genie One or Genie Code, scope it, benchmark it, and share it for teammates to use or customize. Genie Agents let domain experts scale their expertise by turning trusted rules, data, and workflows into coworkers the whole team can rely on.
            - paragraph:
              - figure:
                - 'button "Expand: image6.gif"':
                  - generic:
                    - img "image6.gif"
                  - generic: Expand
            - blockquote [ref=e147]:
              - img [ref=e148]
              - generic [ref=e153]: At Foot Locker, Genie Agents are transforming how we lead. They provide our executives and business teams with a centralized space to harness AI-driven insights across every North American banner we operate. As we scale Genie to the enterprise, it's reshaping the way our business interacts with data and makes the decisions that matter most. Genie isn't just a tool; it's the engine driving self-service insights across our organization
              - generic [ref=e154]: — Matt Giunipero, VP of Data & Analytics and Krish Lakshminarayanan, VP, AI, Data & Analytics, Enterprise Architecture, Foot Locker
            - 'heading "Genie Ontology: a living context graph for your business" [level=2] [ref=e155]'
            - paragraph [ref=e156]:
              - text: Genie One and Genie Agents are powered by
              - strong [ref=e157]: Genie Ontology
              - text: ", an automatic context layer. Genie Ontology automatically extracts snippets of knowledge from tables, queries, dashboards, pipelines, and connected apps, and organizes that knowledge into a living graph of how a company works and what the data inside"
              - emphasis [ref=e158]: actually
              - text: means. Genie has context about where to look, what to trust, and how to answer in a way that reflects how the company actually uses its data. That includes metric definitions, business terms, unique calculations, and the relationships between concepts, metrics, tables, and teams.
            - paragraph:
              - figure:
                - 'button "Expand: image2.gif"':
                  - generic:
                    - img "image2.gif"
                  - generic: Expand
            - paragraph [ref=e159]: One key innovation of Genie Ontology is its approach to determining authority. Using an approach similar to PageRank, Genie Ontology weighs where a definition came from, the relative authority of that source’s author, how often people rely on it, how closely it ties to certified and widely-used assets, and how fresh it is. Then, Genie answers from the sources that carry the most weight. It also enforces the permissions of each source by only showing you the content that you actually have permissions to see. The result is that Genie solves the context problem, without asking your teams to hand-curate it or manage a separate permissions system.
            - paragraph [ref=e160]:
              - text: Our internal benchmark of real-world enterprise data analysis tasks have shown that Genie Ontology significantly improves agent performance on complex, enterprise data questions. In our testing, Genie answered
              - strong [ref=e161]: 84.5%
              - text: of questions correctly on the first attempt, while the strongest general-purpose coding agent managed just
              - strong [ref=e162]: 52.4%
              - text: — and the weakest only
              - strong [ref=e163]: 25%
              - text: . And Genie doesn’t trade off accuracy for speed. Genie delivers high accuracy
              - emphasis [ref=e164]: and
              - text: low latency, 2× faster than the strongest coding agent.
            - 'figure "Source: internal Databricks benchmark — 28-question real-world data-analysis suite, June 2026. Competing coding agents are anonymized." [ref=e165]':
              - 'button "Expand: image3.png"':
                - generic:
                  - img "image3.png"
                - generic: Expand
              - generic [ref=e166]: "Source: internal Databricks benchmark — 28-question real-world data-analysis suite, June 2026. Competing coding agents are anonymized."
            - heading "Governed and secure by design" [level=2] [ref=e167]
            - paragraph [ref=e168]: To roll out any AI tool across a company, leaders and IT teams need confidence that it’s governed, secure, and ready to scale. That’s why Genie One includes a full suite of admin governance tools designed to help organizations deploy AI across their teams.
            - paragraph [ref=e169]:
              - text: Like every Databricks product, governance and security sit at the heart of Genie. Permissions are enforced by default on every answer through source-native ACLs or Unity Catalog. MCP, tools and costs are governed by the
              - strong [ref=e170]: Unity AI Gateway
              - text: ", providing a single pane of governance for admins."
            - paragraph [ref=e171]: Getting started
            - paragraph [ref=e172]: "Genie One is the data-smart AI coworker every business user needs: it understands enterprise context, works across the tools where work happens, and is governed by design."
            - paragraph [ref=e173]:
              - text: To try Genie One, see our
              - link "documentation" [ref=e174] [cursor=pointer]:
                - /url: https://docs.databricks.com/gcp/en/genie-ui/genie
              - text: ", install the mobile app for"
              - link "genie ui iOS" [ref=e175] [cursor=pointer]:
                - /url: https://apps.apple.com/hu/app/databricks-genie/id6758961415
                - text: iOS
              - text: or
              - link "Android" [ref=e176] [cursor=pointer]:
                - /url: https://play.google.com/store/apps/details?id=com.databricks.one.mobile&hl=en_US
              - text: ", or contact your Databricks account team."
